databases:
  - name: eventflow-db
    databaseName: eventflow
    user: render_user
    plan: free

services:
  - type: redis
    name: eventflow-redis
    plan: free
    ipAllowList: []

  - type: web
    name: eventflow-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eventflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: eventflow-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: worker
    name: eventflow-celery
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: "celery -A app.worker.celery_app worker --loglevel=info"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eventflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: eventflow-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: eventflow-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm install -g serve && serve -s dist"
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "https://eventflow-backend.onrender.com"
